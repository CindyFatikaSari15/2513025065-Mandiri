<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmetic Showroom 3D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="control-panel">
        <h2>Cosmetic Store</h2>
        <p>Klik salah satu produk di atas meja untuk mulai mengontrol objek tersebut.</p>
        
        <div class="control-group">
            <label>Produk Terpilih:</label>
            <div class="selected-status" id="selected-product-text">Belum ada (Klik objek 3D)</div>
        </div>

       <div class="control-group">
            <label>Kontrol Transformasi:</label>
            
            <div class="control-item">
                <button class="action-btn" id="btn-rotate">🔄 Putar Objek (Rotasi)</button>
                <small style="display:block; color: #666; margin-bottom: 10px;">* Klik tombol untuk memutar</small>
            </div>

            <div class="control-item">
                <button class="action-btn" style="cursor: help;">🔍 Perbesar/Kecil (Skala)</button>
                <small style="display:block; color: #666; margin-bottom: 10px;">* Arahkan kursor (hover) di atas objek</small>
            </div>

            <div class="control-item">
                <button class="action-btn" style="cursor: move;">🔼 Angkat/Geser Objek (Translasi)</button>
                <small style="display:block; color: #666; margin-bottom: 10px;">* Klik, tahan, dan geser (drag) objek</small>
            </div>
        </div>

        <div class="control-group">
            <label>Ganti Warna Produk:</label>
            <div class="shade-picker">
                <button class="shade-btn" data-color="#ff4d6d" style="background-color: #ff4d6d;"></button>
                <button class="shade-btn" data-color="#a4133c" style="background-color: #a4133c;"></button>
                <button class="shade-btn" data-color="#f7d6c8" style="background-color: #f7d6c8;"></button>
                <button class="shade-btn" data-color="#ffb3c1" style="background-color: #ffb3c1;"></button>
            </div>
        </div>
        
        <div class="instruction">
            <small>*Gunakan klik mouse pada produk untuk memilih objek.</small>
        </div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <script src="app.js"></script>
</body>
</html>
